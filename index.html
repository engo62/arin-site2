<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<title>text1 </title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:ital@1&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  font-style: italic;
  background: url('arka.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  padding: 30px;
  border-radius: 25px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  text-align: center;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.08);
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
}

/* LIGHTBOX */
#lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
}

/* VIDEO OVERLAY */
#videoOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#videoOverlay video {
  width: 90%;
  max-width: 900px;
  border-radius: 20px;
}
</style>

</head>

<body>

<div class="container">

<h1>text </h1>

<div class="message">
text2

</div>

<div class="gallery">
  <img src="foto1.jpg" onclick="openImage(this.src)">
  <img src="foto2.jpg" onclick="openImage(this.src)">
  <img src="foto3.jpg" onclick="openImage(this.src)">
  <img src="foto4.jpg" onclick="openImage(this.src)">
  <img src="foto5.jpg" onclick="openImage(this.src)">
  <img src="foto6.jpg" onclick="openImage(this.src)">
  <img src="foto7.jpg" onclick="openImage(this.src)">
  <img src="foto8.jpg" onclick="openImage(this.src)">
  <img src="foto9.jpg" onclick="openImage(this.src)">
  <img src="foto10.jpg" onclick="openImage(this.src)">
</div>

<button onclick="playVideo()">Sana küçük bir sürprizim var 🎬</button>

<!-- MÜZİK -->

<audio id="music" autoplay loop>
  <source src="sarki.mp3" type="audio/mpeg">
</audio>

</div>

<!-- LIGHTBOX -->

<div id="lightbox" onclick="closeImage()">
  <img id="lightbox-img">
</div>

<!-- VIDEO OVERLAY -->

<div id="videoOverlay" onclick="closeVideo()">
  <video id="myVideo" controls>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<script>
// FOTO BÜYÜTME
function openImage(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeImage() {
  document.getElementById("lightbox").style.display = "none";
}

// VIDEO + SİNEMATİK
function playVideo() {
  const video = document.getElementById("myVideo");
  const overlay = document.getElementById("videoOverlay");
  const music = document.getElementById("music");

  if (music) {
    music.pause();
    music.currentTime = 0;
  }

  overlay.style.display = "flex";

  video.muted = false;
  video.play();
}

function closeVideo() {
  const video = document.getElementById("myVideo");
  video.pause();
  document.getElementById("videoOverlay").style.display = "none";
}

// MÜZİK TARAYICI FIX
window.addEventListener("click", () => {
  document.getElementById("music").play();
});
</script>

</body>
</html>
