<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arin ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:ital@1&display=swap" rel="stylesheet">

<style>
*{-webkit-tap-highlight-color:transparent;}
body{
margin:0;
font-family:'Poppins',sans-serif;
color:white;
background:linear-gradient(135deg,#1e1e2f,#2c2c54,#ff6b81);
display:flex;
justify-content:center;
overflow-x:hidden;
}

/* SPLASH */
#splash{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#1e1e2f;
z-index:9999;
text-align:center;
}

#splashText{font-size:22px;}

/* CONTAINER */
.container{
max-width:420px;
margin:20px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.1);
text-align:center;
}

/* GALERİ */
.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.gallery img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
transition:.2s;
}
.gallery img:active{transform:scale(.95);}

/* LIGHTBOX */
#lightbox{
position:fixed;
inset:0;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}

#lightbox-img{
width:90%;
transition:transform .3s,opacity .3s;
}

/* DOT */
#dots{
position:absolute;
bottom:20px;
display:flex;
gap:6px;
}
.dot{
width:6px;height:6px;border-radius:50%;
background:rgba(255,255,255,.4);
}
.dot.active{background:white;transform:scale(1.3);}

/* BUTTON */
.btn{
display:block;
margin-top:20px;
padding:12px;
background:#ff6b81;
border-radius:10px;
text-decoration:none;
color:white;
}

/* HEART */
@keyframes floatUp{
to{transform:translateY(-100vh);opacity:0;}
}
</style>

</head>

<body>

<div id="splash"><div id="splashText"></div></div>

<div class="container">
<h1>Arin ❤️</h1>
<p>Hazır mısın...?</p>

<div class="gallery">
<img src="foto1.jpg" data-index="0" onclick="openImage(this)">
<img src="foto2.jpg" data-index="1" onclick="openImage(this)">
<img src="foto3.jpg" data-index="2" onclick="openImage(this)">
<img src="foto4.jpg" data-index="3" onclick="openImage(this)">
<img src="foto5.jpg" data-index="4" onclick="openImage(this)">
<img src="foto6.jpg" data-index="5" onclick="openImage(this)">
</div>

<a href="page2.html" class="btn">Devamı ❤️</a>

<audio id="music" loop>
<source src="sarki.mp3">
</audio>
</div>

<div id="lightbox">
<img id="lightbox-img">
<div id="dots"></div>
</div>

<script>
// TEXT
const text="Arin... hazır mısın? ❤️";
let i=0,started=false;

function typeWriter(){
if(i<text.length){
document.getElementById("splashText").innerHTML+=text.charAt(i);
i++;setTimeout(typeWriter,50);
}}
window.onload=typeWriter;

// HEARTS
setInterval(()=>{
let h=document.createElement("div");
h.innerText="❤️";
h.style.position="absolute";
h.style.left=Math.random()*100+"%";
h.style.bottom="0";
h.style.animation="floatUp 4s linear";
document.getElementById("splash").appendChild(h);
setTimeout(()=>h.remove(),4000);
},400);

// START
function start(){
if(started)return;started=true;

navigator.vibrate&&navigator.vibrate([100,50,100]);

let m=document.getElementById("music");
m.volume=0;m.play();

let v=0;
let f=setInterval(()=>{
if(v<1){v+=.05;m.volume=v;}else clearInterval(f);
},200);

setTimeout(()=>splash.style.display="none",1500);
}
splash.onclick=start;

// GALLERY
let currentIndex=0,startX=0,isDragging=false,translate=0;
const images=["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg","foto6.jpg"];

// dots
const dots=document.getElementById("dots");
images.forEach(()=>{let d=document.createElement("div");d.className="dot";dots.appendChild(d);});

function updateDots(){
document.querySelectorAll(".dot").forEach((d,i)=>d.classList.toggle("active",i===currentIndex));
}

function openImage(el){
navigator.vibrate&&navigator.vibrate(30);
currentIndex=parseInt(el.dataset.index);
lightbox.style.display="flex";
lightboxImg.src=images[currentIndex];
updateDots();
}

lightbox.onclick=()=>lightbox.style.display="none";

// SWIPE
lightbox.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;isDragging=true;
});

lightbox.addEventListener("touchmove",e=>{
if(!isDragging)return;
let diff=e.touches[0].clientX-startX;
translate=diff;
lightboxImg.style.transition="none";
lightboxImg.style.transform=`translateX(${diff}px) scale(.98)`;
});

lightbox.addEventListener("touchend",()=>{
isDragging=false;
let diff=translate;

lightboxImg.style.transition="transform .4s ease,opacity .3s";

if(Math.abs(diff)>80){
if(diff<0){
currentIndex=(currentIndex+1)%images.length;
lightboxImg.style.transform="translateX(-100%) scale(.95)";
}else{
currentIndex=(currentIndex-1+images.length)%images.length;
lightboxImg.style.transform="translateX(100%) scale(.95)";
}
setTimeout(()=>{
lightboxImg.src=images[currentIndex];
lightboxImg.style.transition="none";
lightboxImg.style.transform="translateX(0)";
updateDots();
},200);

navigator.vibrate&&navigator.vibrate(20);
}else{
lightboxImg.style.transform="translateX(0)";
}
translate=0;
});
</script>

</body>
</html>
