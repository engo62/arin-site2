<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İyi ki Doğdun Arin ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:ital@1&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  font-style: italic;
  background: url('arka.jpg') no-repeat center center fixed;
  background-size: cover;
  color: white;
}

/* karartma */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

/* cam efekt */
.container {
  max-width: 900px;
  margin: 40px auto;
  padding: 30px;
  border-radius: 25px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  text-align: center;
}

h1 {
  font-size: 42px;
}

.message {
  font-size: 18px;
  line-height: 1.7;
}

.counter {
  margin: 20px 0;
  font-size: 20px;
}

/* galeri */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  margin-top: 20px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
  transition: 0.4s;
  cursor: pointer;
}

.gallery img:hover {
  transform: scale(1.08);
}

/* lightbox */
#lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 20px;
}
</style>

</head>

<body>

<div class="container">

<h1>İyi ki Doğdun Arin ❤️</h1>

<div class="message">
11 Mayıs 2024’te başlayan hikayemiz,  
hayatımın en güzel kısmı oldu.  
Seninle geçen her an benim için ayrı bir mutluluk 💖
</div>

<div class="counter" id="counter"></div>

<div class="gallery">
  <img src="foto1.jpg" onclick="openImage(this.src)">
  <img src="foto2.jpg" onclick="openImage(this.src)">
  <img src="foto3.jpg" onclick="openImage(this.src)">
  <img src="foto4.jpg" onclick="openImage(this.src)">
  <img src="foto5.jpg" onclick="openImage(this.src)">
  <img src="foto6.jpg" onclick="openImage(this.src)">
  <img src="foto7.jpg" onclick="openImage(this.src)">
  <img src="foto8.jpg" onclick="openImage(this.src)">
  <img src="foto9.jpg" onclick="openImage(this.src)">
  <img src="foto10.jpg" onclick="openImage(this.src)">
</div>

<!-- MÜZİK (OTOMATİK) -->

<audio id="music" autoplay loop>
  <source src="sarki.mp3" type="audio/mpeg">
</audio>

</div>

<!-- lightbox -->

<div id="lightbox" onclick="closeImage()">
  <img id="lightbox-img">
</div>

<script>
// gün sayacı
const startDate = new Date("2024-05-11");
const today = new Date();
const days = Math.floor((today - startDate) / (1000*60*60*24));

document.getElementById("counter").innerText =
"Seninle " + days + " gündür birlikteyiz 💞";

// lightbox
function openImage(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeImage() {
  document.getElementById("lightbox").style.display = "none";
}

// bazı tarayıcılar için garanti başlatma
window.addEventListener("click", () => {
  document.getElementById("music").play();
});
</script>

</body>
</html>
