<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İyi ki Doğdun ❤️</title>

<!-- FONT -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:ital@1&display=swap" rel="stylesheet">

<!-- PWA -->

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b81">
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  font-style: italic;
  color: white;
  background: linear-gradient(135deg, #1e1e2f, #2c2c54, #ff6b81);
  display: flex;
  justify-content: center;
  overflow-x: hidden;
}

/* glow */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 60%);
  z-index: -1;
}

/* container (telefon görünümü) */
.container {
  width: 100%;
  max-width: 420px;
  margin: 20px;
  padding: 20px;
  border-radius: 25px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(15px);
  text-align: center;

  opacity: 0;
  transform: translateY(30px);
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-size: 26px;
}

.message {
  font-size: 14px;
  margin-bottom: 15px;
}

/* GALERİ */
.gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.gallery img {
  width: 100%;
  aspect-ratio: 1/1;
  object-fit: cover;
  border-radius: 12px;
  cursor: pointer;
}

/* LIGHTBOX */
#lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 15px;
}

/* KALPLER */
.heart {
  position: fixed;
  bottom: -20px;
  color: #ff6b81;
  font-size: 16px;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  to {
    transform: translateY(-110vh);
    opacity: 0;
  }
}
</style>

</head>

<body>

<div class="container">

<h1>İyi ki Doğdun ❤️</h1>

<div class="message">
Benim güzel kızım, sevgilim...  
Bu siteyi sana küçük bir anı bırakmak için yaptım.  
Seni çok seviyorum 💖
</div>

<div class="gallery">
  <img src="foto1.jpg" onclick="openImage(this.src)">
  <img src="foto2.jpg" onclick="openImage(this.src)">
  <img src="foto3.jpg" onclick="openImage(this.src)">
  <img src="foto4.jpg" onclick="openImage(this.src)">
  <img src="foto5.jpg" onclick="openImage(this.src)">
  <img src="foto6.jpg" onclick="openImage(this.src)">
  <img src="foto7.jpg" onclick="openImage(this.src)">
  <img src="foto8.jpg" onclick="openImage(this.src)">
  <img src="foto9.jpg" onclick="openImage(this.src)">
  <img src="foto10.jpg" onclick="openImage(this.src)">
</div>

<!-- MÜZİK -->

<audio id="music" autoplay loop>
  <source src="sarki.mp3" type="audio/mpeg">
</audio>

</div>

<!-- LIGHTBOX -->

<div id="lightbox" onclick="closeImage()">
  <img id="lightbox-img">
</div>

<script>
// FOTO
function openImage(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeImage() {
  document.getElementById("lightbox").style.display = "none";
}

// MÜZİK (tarayıcı fix)
window.addEventListener("click", () => {
  document.getElementById("music").play();
});

// KALP ANİMASYONU
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerText = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 400);
</script>

</body>
</html>
