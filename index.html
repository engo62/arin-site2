<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Başlangıç ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:ital@1&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#1e1e2f,#2c2c54,#ff6b81);
  color:white;
  display:flex;
  justify-content:center;
}

.container {
  max-width:420px;
  margin:20px;
  padding:20px;
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  text-align:center;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.gallery img {
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:10px;
}

.btn {
  display:block;
  margin-top:20px;
  padding:12px;
  background:#ff6b81;
  border-radius:10px;
  text-decoration:none;
  color:white;
}
</style>

</head>

<body>
<div class="container">
<h1>Nasıl Başladık ❤️</h1>
<p>Her şey o gün başladı...</p>

<div class="gallery">
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
<img src="foto4.jpg">
</div>

<a href="page2.html" class="btn">Devamı →</a>

</div>
</body>
</html>
