<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝓐𝓻𝓲𝓷🤍𝓔𝓷𝓰𝓲𝓷 </title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:ital@1&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff6b81">
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  background:linear-gradient(135deg,#1e1e2f,#2c2c54,#ff6b81);
  display:flex;
  justify-content:center;
}

/* SPLASH */
#splash {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#1e1e2f;
  z-index:9999;
  text-align:center;
  padding:20px;
}

#splashText {
  font-size:20px;
}

/* CONTAINER */
.container {
  max-width:420px;
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  text-align:center;
}

/* GALERİ */
.gallery {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.gallery img {
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

/* LIGHTBOX */
#lightbox {
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

#lightbox img {
  width:90%;
}
</style>

</head>

<body>

<!-- SPLASH -->

<div id="splash">
  <div id="splashText"></div>
</div>

<div class="container">
<h1>İyi ki Doğdun ❤️</h1>

<p>Benim güzel kızım... Seni çok seviyorum 💖</p>

<div class="gallery">
<img src="foto1.jpg" onclick="openImage(this.src)">
<img src="foto2.jpg" onclick="openImage(this.src)">
<img src="foto3.jpg" onclick="openImage(this.src)">
<img src="foto4.jpg" onclick="openImage(this.src)">
<img src="foto5.jpg" onclick="openImage(this.src)">
<img src="foto6.jpg" onclick="openImage(this.src)">
<img src="foto7.jpg" onclick="openImage(this.src)">
<img src="foto8.jpg" onclick="openImage(this.src)">
<img src="foto9.jpg" onclick="openImage(this.src)">
<img src="foto10.jpg" onclick="openImage(this.src)">
</div>

<audio id="music" loop>
  <source src="sarki.mp3">
</audio>
</div>

<!-- LIGHTBOX -->

<div id="lightbox" onclick="closeImage()">
<img id="lightbox-img">
</div>

<script>
// ✍️ YAZI
const text = "Dünyanın en güzel kızına";
let i = 0;
let started = false;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("splashText").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 50);
  }
}
window.onload = typeWriter;

// 🚀 BAŞLAT
function startExperience() {
  if (started) return;
  started = true;

  // titreşim
  if (navigator.vibrate) {
    navigator.vibrate([100,50,100]);
  }

  const music = document.getElementById("music");
  music.volume = 0;
  music.play();

  // fade-in
  let vol = 0;
  const fade = setInterval(() => {
    if (vol < 1) {
      vol += 0.05;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);

  // splash kapat
  setTimeout(() => {
    document.getElementById("splash").style.display = "none";
  }, 1500);
}

// dokununca başlat
document.getElementById("splash").addEventListener("click", startExperience);

// foto
function openImage(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}
function closeImage() {
  document.getElementById("lightbox").style.display = "none";
}

// service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
