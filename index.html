<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İyi ki Doğdun Güzelim ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  text-align: center;
}

.container {
  padding: 30px;
}

h1 {
  font-size: 40px;
}

.message {
  font-size: 18px;
  max-width: 600px;
  margin: 20px auto;
  line-height: 1.6;
}

.counter {
  font-size: 20px;
  margin: 20px;
}

.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.gallery img {
  width: 200px;
  margin: 10px;
  border-radius: 15px;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.05);
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff6b81;
  font-size: 16px;
  cursor: pointer;
}

.secret {
  margin-top: 20px;
  display: none;
  font-size: 18px;
}
</style>

</head>

<body>

<div class="container">

<h1>İyi ki Doğdun Arin ❤️</h1>

<div class="message">
Seninle 11 Mayıs 2024'te başlayan hikayemiz,  
hayatımın en güzel kısmı oldu.  
Seninle geçen her gün ayrı bir mutluluk.  
İyi ki varsın, iyi ki benimlesin 💖
</div>

<div class="counter" id="counter"></div>

<div class="gallery">
  <img src="foto1.jpg">
  <img src="foto2.jpg">
  <img src="foto3.jpg">
  <img src="foto4.jpg">
  <img src="foto5.jpg">
  <img src="foto6.jpg">
  <img src="foto7.jpg">
  <img src="foto8.jpg">
  <img src="foto9.jpg">
  <img src="foto10.jpg">
</div>

<button onclick="surprise()">Sürprize tıkla 💌</button>

<div class="secret" id="secret">
Seni her geçen gün daha çok seviyorum... ❤️
</div>

<button onclick="playMusic()">Müziği Başlat 🎶</button>

<audio id="music" loop>
  <source src="sarki.mp3" type="audio/mpeg">
</audio>

</div>

<script>
// Gün sayacı
const startDate = new Date("2024-05-11");
const today = new Date();
const diffTime = today - startDate;
const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));
document.getElementById("counter").innerText =
  "Seninle " + days + " gündür birlikteyiz 💞";

// sürpriz
function surprise() {
  document.getElementById("secret").style.display = "block";
}

// müzik
function playMusic() {
  document.getElementById("music").play();
}
</script>

</body>
</html>
