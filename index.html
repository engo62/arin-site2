<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İyi ki Doğdun ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:ital@1&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  font-style: italic;
  background: linear-gradient(135deg, #ff6b81, #ff9a9e, #ffd1dc);
  color: white;
}

/* glow */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at top, rgba(255,255,255,0.3), transparent 70%);
  z-index: -1;
}

/* animasyon */
.container {
  max-width: 900px;
  margin: 40px auto;
  padding: 30px;
  border-radius: 25px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(15px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  text-align: center;

  opacity: 0;
  transform: translateY(30px);
  animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

h1 {
  font-size: 40px;
}

.message {
  font-size: 18px;
  margin-bottom: 20px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
}

.gallery img {
  width: 100%;
  border-radius: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.gallery img:hover {
  transform: scale(1.08);
}

button {
  margin-top: 20px;
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  background: white;
  color: #ff4d6d;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* lightbox */
#lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 20px;
}

/* video overlay */
#videoOverlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#videoOverlay video {
  width: 90%;
  max-width: 900px;
  border-radius: 20px;
}
</style>

</head>

<body>

<div class="container">

<h1>İyi ki Doğdun ❤️</h1>

<div class="message">
Benim güzel kızım, sevgilim, her şeyim...  
Bu siteyi sana küçük bir anı bırakmak için yaptım.  
Seni her şeyden çok seviyorum 💖
</div>

<div class="gallery">
  <img src="foto1.jpg" onclick="openImage(this.src)">
  <img src="foto2.jpg" onclick="openImage(this.src)">
  <img src="foto3.jpg" onclick="openImage(this.src)">
  <img src="foto4.jpg" onclick="openImage(this.src)">
  <img src="foto5.jpg" onclick="openImage(this.src)">
  <img src="foto6.jpg" onclick="openImage(this.src)">
  <img src="foto7.jpg" onclick="openImage(this.src)">
  <img src="foto8.jpg" onclick="openImage(this.src)">
  <img src="foto9.jpg" onclick="openImage(this.src)">
  <img src="foto10.jpg" onclick="openImage(this.src)">
</div>

<button onclick="playVideo()">Sana küçük bir sürprizim var 🎬</button>

<audio id="music" autoplay loop>
  <source src="sarki.mp3" type="audio/mpeg">
</audio>

</div>

<div id="lightbox" onclick="closeImage()">
  <img id="lightbox-img">
</div>

<div id="videoOverlay" onclick="closeVideo()">
  <video id="myVideo" controls>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<script>
function openImage(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeImage() {
  document.getElementById("lightbox").style.display = "none";
}

function playVideo() {
  const video = document.getElementById("myVideo");
  const overlay = document.getElementById("videoOverlay");
  const music = document.getElementById("music");

  if (music) {
    music.pause();
    music.currentTime = 0;
  }

  overlay.style.display = "flex";
  video.muted = false;
  video.play();
}

function closeVideo() {
  const video = document.getElementById("myVideo");
  video.pause();
  document.getElementById("videoOverlay").style.display = "none";
}

window.addEventListener("click", () => {
  document.getElementById("music").play();
});
</script>

</body>
</html>
