<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro</title>

<style>
  body {
    margin: 0;
    background: black;
    font-family: sans-serif;
    overflow: hidden;
  }

  #splash {
    position: fixed;
    inset: 0;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 1;
    transition: opacity 0.6s ease;
    z-index: 9999;
  }

  #splashText {
    font-size: 22px;
    text-align: center;
    letter-spacing: 1px;
  }
</style>
</head>

<body>

<div id="splash">
  <h1 id="splashText"></h1>
</div>

<audio id="sarki" src="music.mp3"></audio>

<script>
const text = "İyi ki varsın Arin ❤️";

let typingDone = false;
let musicStarted = false;

// ✍️ yazı efekti
function typeWriter() {
  const el = document.getElementById("splashText");
  el.innerHTML = "";

  let i = 0;

  const interval = setInterval(() => {
    if (i < text.length) {
      el.innerHTML += text[i];
      i++;
    } else {
      clearInterval(interval);
      typingDone = true;
    }
  }, 50);
}

// 🚀 deneyimi başlat
function startExperience() {
  if (!typingDone || musicStarted) return;

  musicStarted = true;

  const splash = document.getElementById("splash");
  const sarki = document.getElementById("sarki");

  // 📳 titreşim
  if (navigator.vibrate) {
    navigator.vibrate([40, 20, 40]);
  }

  // 🎬 smooth fade out
  splash.style.opacity = "0";
  setTimeout(() => {
    splash.style.display = "none";
  }, 600);

  // 🎧 şarkı fade-in
  sarki.volume = 0;
  sarki.play().catch(() => {});

  let vol = 0;
  const fade = setInterval(() => {
    vol = Math.min(vol + 0.02, 1);
    sarki.volume = vol;
    if (vol >= 1) clearInterval(fade);
  }, 50);
}

// 📱 click + touch
const splash = document.getElementById("splash");
splash.addEventListener("click", startExperience);
splash.addEventListener("touchstart", startExperience);

// ✍️ başlat
window.onload = typeWriter;

// 🔓 mobil audio unlock fix
document.addEventListener("touchstart", () => {
  const sarki = document.getElementById("sarki");
  if (sarki) {
    sarki.play().then(() => sarki.pause()).catch(() => {});
  }
}, { once: true });

// 📦 service worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
