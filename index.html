<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İyi ki Doğdun Arin ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  font-style: italic;
  background: url('arka.jpg') no-repeat center center fixed;
  background-size: cover;
  text-align: center;
  color: white;
}

/* karartma */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

.container {
  padding: 30px;
}

h1 {
  font-size: 42px;
}

.message {
  font-size: 20px;
  max-width: 650px;
  margin: 20px auto;
  line-height: 1.7;
}

.counter {
  font-size: 22px;
  margin: 20px;
}

.gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.gallery img {
  width: 200px;
  margin: 10px;
  border-radius: 15px;
  transition: 0.3s;
  cursor: pointer;
}

.gallery img:hover {
  transform: scale(1.08);
}

button {
  margin-top: 20px;
  padding: 12px 22px;
  border: none;
  border-radius: 20px;
  background: white;
  color: #ff6b81;
  font-size: 16px;
  cursor: pointer;
  font-style: italic;
}

.secret {
  margin-top: 20px;
  display: none;
  font-size: 20px;
}

/* LIGHTBOX */
#lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 15px;
}
</style>

</head>

<body>

<div class="container">

<h1>İyi ki Doğdun Arin ❤️</h1>

<div class="message">
11 Mayıs 2024’te başlayan hikayemiz,  
hayatımın en güzel kısmı oldu.  
Seninle geçen her an benim için ayrı bir mutluluk.  
İyi ki varsın 💖
</div>

<div class="counter" id="counter"></div>

<div class="gallery">
  <img src="foto1.jpg" onclick="openImage(this.src)">
  <img src="foto2.jpg" onclick="openImage(this.src)">
  <img src="foto3.jpg" onclick="openImage(this.src)">
  <img src="foto4.jpg" onclick="openImage(this.src)">
  <img src="foto5.jpg" onclick="openImage(this.src)">
  <img src="foto6.jpg" onclick="openImage(this.src)">
  <img src="foto7.jpg" onclick="openImage(this.src)">
  <img src="foto8.jpg" onclick="openImage(this.src)">
  <img src="foto9.jpg" onclick="openImage(this.src)">
  <img src="foto10.jpg" onclick="openImage(this.src)">
</div>

<button onclick="surprise()">Sürprize tıkla 💌</button>

<div class="secret" id="secret">
Seni her geçen gün daha çok seviyorum... ❤️
</div>

<button onclick="playMusic()">Müziği Başlat 🎶</button>

<audio id="music" loop>
  <source src="sarki.mp3" type="audio/mpeg">
</audio>

</div>

<!-- LIGHTBOX -->

<div id="lightbox" onclick="closeImage()">
  <img id="lightbox-img">
</div>

<script>
// gün sayacı
const startDate = new Date("2024-05-11");
const today = new Date();
const diffTime = today - startDate;
const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

document.getElementById("counter").innerText =
"Seninle " + days + " gündür birlikteyiz 💞";

// sürpriz
function surprise() {
  document.getElementById("secret").style.display = "block";
}

// müzik
function playMusic() {
  document.getElementById("music").play();
}

// lightbox
function openImage(src) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = src;
}

function closeImage() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
